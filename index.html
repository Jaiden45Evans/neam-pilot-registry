<!DOCTYPE html>
<html>
<head>
<title>NEAM Pilot Registry</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;
    color:white;
    overflow:hidden;
    background:linear-gradient(#5aa9ff,#bfe5ff);
    display:flex;
    justify-content:center;
    align-items:center;
}

.cloud{
    position:absolute;
    background:white;
    border-radius:50px;
    opacity:.75;
    animation:cloudMove linear infinite;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud::before{
    width:70px;
    height:70px;
    top:-35px;
    left:25px;
}

.cloud::after{
    width:90px;
    height:90px;
    top:-50px;
    left:80px;
}

.cloud1{
    width:180px;
    height:55px;
    top:12%;
    left:-250px;
    animation-duration:55s;
}

.cloud2{
    width:220px;
    height:65px;
    top:34%;
    left:-300px;
    animation-duration:75s;
    animation-delay:10s;
}

.cloud3{
    width:160px;
    height:50px;
    top:68%;
    left:-220px;
    animation-duration:65s;
    animation-delay:20s;
}

@keyframes cloudMove{
    from{ transform:translateX(-250px); }
    to{ transform:translateX(130vw); }
}

.jet{
    position:absolute;
    left:-200px;
    top:18%;
    font-size:58px;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.35));
    animation:flyby 26s linear infinite;
    z-index:1;
}

.jet:nth-of-type(5){
    top:72%;
    animation-delay:14s;
    animation-duration:32s;
    font-size:48px;
}

@keyframes flyby{
    0%{ transform:translateX(-250px) rotate(8deg); opacity:0; }
    5%{ opacity:1; }
    90%{ opacity:1; }
    100%{ transform:translateX(130vw) rotate(8deg); opacity:0; }
}

.card{
    position:relative;
    z-index:5;
    background:rgba(11,18,32,.88);
    backdrop-filter:blur(8px);
    padding:40px;
    border-radius:18px;
    width:430px;
    box-shadow:0 0 35px rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.18);
}

h1{
    text-align:center;
    margin-bottom:8px;
    letter-spacing:.5px;
}

p{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

input,
select{
    width:100%;
    height:45px;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    height:48px;
    background:#1d4ed8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-top:4px;
}

button:hover{
    background:#2563eb;
}

button:disabled{
    background:#64748b;
    cursor:not-allowed;
}

.small{
    font-size:12px;
    color:#94a3b8;
    margin-top:18px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="jet">✈</div>
<div class="jet">✈</div>

<div class="card">

<h1>NEAM Pilot Registry</h1>

<p>Check in for your simulator session.</p>

<input id="firstName" placeholder="First Name">

<input id="lastInitial" maxlength="1" placeholder="Last Initial">

<input id="callsign" placeholder="Callsign">

<select id="aircraft">
<option value="">Select Aircraft</option>
<option>F/A-18C Hornet</option>
<option>F-16C Viper</option>
<option>F-15C Eagle</option>
<option>F-22A Raptor</option>
</select>

<select id="timeSlot">
<option value="">Select Time Slot</option>
<option>9:00 AM</option>
<option>9:20 AM</option>
<option>9:40 AM</option>
<option>10:00 AM</option>
<option>10:20 AM</option>
<option>10:40 AM</option>
<option>11:00 AM</option>
<option>11:20 AM</option>
<option>11:40 AM</option>
<option>12:00 PM</option>
<option>12:20 PM</option>
<option>12:40 PM</option>
<option>1:00 PM</option>
<option>1:20 PM</option>
<option>1:40 PM</option>
<option>2:00 PM</option>
<option>2:20 PM</option>
<option>2:40 PM</option>
<option>3:00 PM</option>
<option>3:20 PM</option>
<option>3:40 PM</option>
<option>4:00 PM</option>
</select>

<button id="submitButton" onclick="submitPilot()">Begin Session</button>

<p class="small">
Your simulator score may be added after your flight. Public results should use first name, last initial, and callsign only.
</p>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHkwKVSKavKNFNJ-U4MRojMF9deaUUIt3TVNGbb81k9E5Z4yY1D44pBL168GVcxFWemw/exec";

function submitPilot(){

    const button = document.getElementById("submitButton");

    button.disabled = true;
    button.innerText = "Submitting...";

    const firstName = document.getElementById("firstName").value.trim();
    const lastInitial = document.getElementById("lastInitial").value.trim().toUpperCase();
    const callsign = document.getElementById("callsign").value.trim();
    const aircraft = document.getElementById("aircraft").value;
    const timeSlot = document.getElementById("timeSlot").value;

    if(!firstName || !lastInitial || !callsign || !aircraft || !timeSlot){
        alert("Please fill out all fields.");
        button.disabled = false;
        button.innerText = "Begin Session";
        return;
    }

    const pilot = {
        pilotID: Date.now(),
        firstName: firstName,
        lastInitial: lastInitial,
        callsign: callsign,
        aircraft: aircraft,
        timeSlot: timeSlot
    };

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify(pilot)
    })
    .then(response => response.json())
    .then(data => {
        alert("Check-in complete. Good luck, pilot.");

        document.getElementById("firstName").value = "";
        document.getElementById("lastInitial").value = "";
        document.getElementById("callsign").value = "";
        document.getElementById("aircraft").value = "";
        document.getElementById("timeSlot").value = "";

        button.innerText = "Submitted";
    })
    .catch(error => {
        console.log(error);
        alert("Error submitting registration.");
        button.disabled = false;
        button.innerText = "Begin Session";
    });
}
</script>

</body>
</html>
