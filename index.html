<!DOCTYPE html>
<html>
<head>
<title>NEAM Pilot Registry</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;
    color:white;
    overflow:hidden;
    background:linear-gradient(to bottom,#5fb8ff 0%,#9bdcff 45%,#dff6ff 100%);
    display:flex;
    justify-content:center;
    align-items:center;
}

.sky{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.sun-glow{
    position:absolute;
    width:520px;
    height:520px;
    top:-160px;
    right:-120px;
    background:radial-gradient(circle,rgba(255,255,255,.75),rgba(255,255,255,.22),rgba(255,255,255,0) 70%);
    filter:blur(8px);
}

.cloud{
    position:absolute;
    width:360px;
    height:120px;
    background:rgba(255,255,255,.65);
    border-radius:100px;
    filter:blur(12px);
    opacity:.75;
    animation:cloudMove linear infinite;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:rgba(255,255,255,.75);
    border-radius:50%;
}

.cloud::before{
    width:180px;
    height:180px;
    left:45px;
    top:-75px;
}

.cloud::after{
    width:220px;
    height:220px;
    right:20px;
    top:-105px;
}

.cloud1{ top:12%; left:-520px; animation-duration:70s; }
.cloud2{ top:34%; left:-620px; width:460px; height:140px; animation-duration:95s; animation-delay:12s; opacity:.55; }
.cloud3{ top:68%; left:-560px; width:420px; height:130px; animation-duration:85s; animation-delay:25s; opacity:.48; }
.cloud4{ top:50%; left:-700px; width:600px; height:150px; animation-duration:120s; animation-delay:40s; opacity:.32; }

@keyframes cloudMove{
    from{ transform:translateX(-650px); }
    to{ transform:translateX(150vw); }
}

.flyby{
    position:absolute;
    left:-900px;
    top:22%;
    width:720px;
    opacity:.82;
    filter:brightness(0) drop-shadow(0 10px 12px rgba(0,0,0,.45));
    animation:jetFlyby 13s linear infinite;
    animation-delay:4s;
    z-index:2;
}

.flyby.second{
    top:72%;
    width:520px;
    opacity:.62;
    animation-duration:15s;
    animation-delay:22s;
}

@keyframes jetFlyby{
    0%{
        transform:translateX(-900px) translateY(0) rotate(2deg);
        opacity:0;
    }
    8%{ opacity:.85; }
    85%{ opacity:.85; }
    100%{
        transform:translateX(170vw) translateY(-50px) rotate(2deg);
        opacity:0;
    }
}

.card{
    position:relative;
    z-index:5;
    background:rgba(8,15,30,.82);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:18px;
    width:430px;
    box-shadow:0 0 40px rgba(0,0,0,.42);
    border:1px solid rgba(255,255,255,.2);
}

h1{
    text-align:center;
    margin-bottom:8px;
    letter-spacing:.5px;
}

p{
    text-align:center;
    color:#d6e4f0;
    margin-bottom:25px;
}

input,select{
    width:100%;
    height:45px;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    height:48px;
    background:#1d4ed8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-top:4px;
}

button:hover{ background:#2563eb; }

button:disabled{
    background:#64748b;
    cursor:not-allowed;
}

.small{
    font-size:12px;
    color:#aab8ca;
    margin-top:18px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="sky">
    <div class="sun-glow"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>

    <img class="flyby" src="f16.png">
    <img class="flyby second" src="f16.png">
</div>

<div class="card">

<h1>NEAM Pilot Registry</h1>
<p>Check in for your simulator session.</p>

<input id="firstName" placeholder="First Name">
<input id="lastInitial" maxlength="1" placeholder="Last Initial">
<input id="callsign" placeholder="Callsign">

<select id="aircraft">
<option value="">Select Aircraft</option>
<option>F/A-18C Hornet</option>
<option>F-16C Viper</option>
<option>F-15C Eagle</option>
<option>F-22A Raptor</option>
</select>

<select id="timeSlot">
<option value="">Select Time Slot</option>
<option>9:00 AM</option>
<option>9:20 AM</option>
<option>9:40 AM</option>
<option>10:00 AM</option>
<option>10:20 AM</option>
<option>10:40 AM</option>
<option>11:00 AM</option>
<option>11:20 AM</option>
<option>11:40 AM</option>
<option>12:00 PM</option>
<option>12:20 PM</option>
<option>12:40 PM</option>
<option>1:00 PM</option>
<option>1:20 PM</option>
<option>1:40 PM</option>
<option>2:00 PM</option>
<option>2:20 PM</option>
<option>2:40 PM</option>
<option>3:00 PM</option>
<option>3:20 PM</option>
<option>3:40 PM</option>
<option>4:00 PM</option>
</select>

<button id="submitButton" onclick="submitPilot()">Begin Session</button>

<p class="small">
Your simulator score may be added after your flight. Public results should use first name, last initial, and callsign only.
</p>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHkwKVSKavKNFNJ-U4MRojMF9deaUUIt3TVNGbb81k9E5Z4yY1D44pBL168GVcxFWemw/exec";

function submitPilot(){

    const button = document.getElementById("submitButton");
    button.disabled = true;
    button.innerText = "Submitting...";

    const firstName = document.getElementById("firstName").value.trim();
    const lastInitial = document.getElementById("lastInitial").value.trim().toUpperCase();
    const callsign = document.getElementById("callsign").value.trim();
    const aircraft = document.getElementById("aircraft").value;
    const timeSlot = document.getElementById("timeSlot").value;

    if(!firstName || !lastInitial || !callsign || !aircraft || !timeSlot){
        alert("Please fill out all fields.");
        button.disabled = false;
        button.innerText = "Begin Session";
        return;
    }

    const pilot = {
        pilotID: Date.now(),
        firstName: firstName,
        lastInitial: lastInitial,
        callsign: callsign,
        aircraft: aircraft,
        timeSlot: timeSlot
    };

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify(pilot)
    })
    .then(response => response.json())
    .then(data => {
        alert("Check-in complete. Good luck, pilot.");

        document.getElementById("firstName").value = "";
        document.getElementById("lastInitial").value = "";
        document.getElementById("callsign").value = "";
        document.getElementById("aircraft").value = "";
        document.getElementById("timeSlot").value = "";

        button.innerText = "Submitted";
    })
    .catch(error => {
        console.log(error);
        alert("Error submitting registration.");
        button.disabled = false;
        button.innerText = "Begin Session";
    });
}
</script>

</body>
</html>
