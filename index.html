<!DOCTYPE html>
<html>
<head>
<title>NEAM Pilot Registry</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;
    color:white;
    overflow:hidden;
    background:linear-gradient(to bottom,#5fb8ff 0%,#9bdcff 45%,#dff6ff 100%);
    display:flex;
    justify-content:center;
    align-items:center;
}

.sky{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.sun-glow{
    position:absolute;
    width:520px;
    height:520px;
    top:-160px;
    right:-120px;
    background:radial-gradient(circle,rgba(255,255,255,.75),rgba(255,255,255,.22),rgba(255,255,255,0) 70%);
    filter:blur(8px);
}

.cloud{
    position:absolute;
    width:360px;
    height:120px;
    background:rgba(255,255,255,.65);
    border-radius:100px;
    filter:blur(12px);
    opacity:.75;
    animation:cloudMove linear infinite;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:rgba(255,255,255,.75);
    border-radius:50%;
}

.cloud::before{
    width:180px;
    height:180px;
    left:45px;
    top:-75px;
}

.cloud::after{
    width:220px;
    height:220px;
    right:20px;
    top:-105px;
}

.cloud1{ top:12%; left:-520px; animation-duration:70s; }
.cloud2{ top:34%; left:-620px; width:460px; height:140px; animation-duration:95s; animation-delay:12s; opacity:.55; }
.cloud3{ top:68%; left:-560px; width:420px; height:130px; animation-duration:85s; animation-delay:25s; opacity:.48; }
.cloud4{ top:50%; left:-700px; width:600px; height:150px; animation-duration:120s; animation-delay:40s; opacity:.32; }

@keyframes cloudMove{
    from{ transform:translateX(-650px); }
    to{ transform:translateX(150vw); }
}

.card{
    position:relative;
    z-index:5;
    background:rgba(8,15,30,.82);
    backdrop-filter:blur(12px);
    padding:38px;
    border-radius:18px;
    width:450px;
    box-shadow:0 0 40px rgba(0,0,0,.42);
    border:1px solid rgba(255,255,255,.2);
}

h1{
    text-align:center;
    margin-bottom:8px;
    letter-spacing:.5px;
}

p{
    text-align:center;
    color:#d6e4f0;
    margin-bottom:20px;
}

.nav{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:22px;
    flex-wrap:wrap;
}

.nav a{
    color:white;
    text-decoration:none;
    padding:9px 12px;
    background:#1d4ed8;
    border-radius:8px;
    font-size:14px;
}

.nav a:hover{
    background:#2563eb;
}

input,select{
    width:100%;
    height:45px;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    height:48px;
    background:#1d4ed8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-top:4px;
}

button:hover{ background:#2563eb; }

button:disabled{
    background:#64748b;
    cursor:not-allowed;
}

.small{
    font-size:12px;
    color:#aab8ca;
    margin-top:18px;
    line-height:1.4;
}

/* FLOATING KEYBOARD BUTTON */
.keyboard-toggle{
    position:fixed;
    right:28px;
    top:50%;
    transform:translateY(-50%);
    z-index:9998;
    width:70px;
    height:70px;
    border-radius:50%;
    background:#0f766e;
    box-shadow:0 0 25px rgba(0,0,0,.35);
    font-size:30px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.keyboard-toggle:hover{
    background:#0d9488;
}

/* ON-SCREEN KEYBOARD */
.keyboard{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:rgba(8,15,30,.97);
    padding:14px;
    z-index:9999;
    display:none;
    box-shadow:0 -8px 30px rgba(0,0,0,.45);
}

.keyboard-row{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:8px;
}

.key{
    width:auto;
    min-width:54px;
    height:52px;
    padding:0 16px;
    background:#1d4ed8;
    color:white;
    border:none;
    border-radius:8px;
    font-size:20px;
    cursor:pointer;
}

.key:hover{
    background:#2563eb;
}

.key.wide{
    min-width:130px;
}

.key.space{
    min-width:280px;
}

.key.shift-on{
    background:#f59e0b;
}
</style>
</head>

<body>

<div class="sky">
    <div class="sun-glow"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>
</div>

<button type="button" class="keyboard-toggle" onclick="toggleKeyboard()">⌨</button>

<div class="card">

<h1>NEAM Pilot Registry</h1>
<p>Check in for your simulator session.</p>

<div class="nav">
    <a href="index.html">Register</a>
    <a href="active.html">Recent Flights</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="search.html">Search</a>
</div>

<input id="firstName" placeholder="First Name" autocomplete="off">
<input id="lastInitial" maxlength="1" placeholder="Last Initial" autocomplete="off">
<input id="callsign" placeholder="Callsign" autocomplete="off">

<select id="aircraft">
<option value="">Select Aircraft</option>
<option>F/A-18C Hornet</option>
<option>F-16C Viper</option>
<option>F-15C Eagle</option>
<option>F-22A Raptor</option>
</select>

<select id="timeSlot">
<option value="">Select Time Slot</option>
<option>9:00 AM</option>
<option>9:20 AM</option>
<option>9:40 AM</option>
<option>10:00 AM</option>
<option>10:20 AM</option>
<option>10:40 AM</option>
<option>11:00 AM</option>
<option>11:20 AM</option>
<option>11:40 AM</option>
<option>12:00 PM</option>
<option>12:20 PM</option>
<option>12:40 PM</option>
<option>1:00 PM</option>
<option>1:20 PM</option>
<option>1:40 PM</option>
<option>2:00 PM</option>
<option>2:20 PM</option>
<option>2:40 PM</option>
<option>3:00 PM</option>
<option>3:20 PM</option>
<option>3:40 PM</option>
<option>4:00 PM</option>
</select>

<button id="submitButton" onclick="submitPilot()">Begin Session</button>

<p class="small">
Your simulator score may be added after your flight. Public results should use first name, last initial, and callsign only.
</p>

</div>

<div class="keyboard" id="keyboard">
    <div class="keyboard-row">
        <button class="key letter-key" onclick="typeKey('q')">q</button>
        <button class="key letter-key" onclick="typeKey('w')">w</button>
        <button class="key letter-key" onclick="typeKey('e')">e</button>
        <button class="key letter-key" onclick="typeKey('r')">r</button>
        <button class="key letter-key" onclick="typeKey('t')">t</button>
        <button class="key letter-key" onclick="typeKey('y')">y</button>
        <button class="key letter-key" onclick="typeKey('u')">u</button>
        <button class="key letter-key" onclick="typeKey('i')">i</button>
        <button class="key letter-key" onclick="typeKey('o')">o</button>
        <button class="key letter-key" onclick="typeKey('p')">p</button>
    </div>

    <div class="keyboard-row">
        <button class="key letter-key" onclick="typeKey('a')">a</button>
        <button class="key letter-key" onclick="typeKey('s')">s</button>
        <button class="key letter-key" onclick="typeKey('d')">d</button>
        <button class="key letter-key" onclick="typeKey('f')">f</button>
        <button class="key letter-key" onclick="typeKey('g')">g</button>
        <button class="key letter-key" onclick="typeKey('h')">h</button>
        <button class="key letter-key" onclick="typeKey('j')">j</button>
        <button class="key letter-key" onclick="typeKey('k')">k</button>
        <button class="key letter-key" onclick="typeKey('l')">l</button>
    </div>

    <div class="keyboard-row">
        <button id="shiftKey" class="key wide" onclick="toggleShift()">Shift</button>
        <button class="key letter-key" onclick="typeKey('z')">z</button>
        <button class="key letter-key" onclick="typeKey('x')">x</button>
        <button class="key letter-key" onclick="typeKey('c')">c</button>
        <button class="key letter-key" onclick="typeKey('v')">v</button>
        <button class="key letter-key" onclick="typeKey('b')">b</button>
        <button class="key letter-key" onclick="typeKey('n')">n</button>
        <button class="key letter-key" onclick="typeKey('m')">m</button>
        <button class="key wide" onclick="backspaceKey()">⌫</button>
    </div>

    <div class="keyboard-row">
        <button class="key space" onclick="typeKey(' ')">SPACE</button>
        <button class="key wide" onclick="hideKeyboard()">DONE</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHkwKVSKavKNFNJ-U4MRojMF9deaUUIt3TVNGbb81k9E5Z4yY1D44pBL168GVcxFWemw/exec";

let activeInput = null;
let shiftOn = false;

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("focus", () => {
        activeInput = input;
    });
});

function toggleKeyboard(){
    const keyboard = document.getElementById("keyboard");

    if(keyboard.style.display === "block"){
        keyboard.style.display = "none";
    }else{
        keyboard.style.display = "block";

        if(!activeInput){
            activeInput = document.getElementById("firstName");
            activeInput.focus();
        }
    }
}

function toggleShift(){
    shiftOn = !shiftOn;

    const shiftKey = document.getElementById("shiftKey");
    const letterKeys = document.querySelectorAll(".letter-key");

    if(shiftOn){
        shiftKey.classList.add("shift-on");
        letterKeys.forEach(key => {
            key.innerText = key.innerText.toUpperCase();
        });
    }else{
        shiftKey.classList.remove("shift-on");
        letterKeys.forEach(key => {
            key.innerText = key.innerText.toLowerCase();
        });
    }

    if(activeInput) activeInput.focus();
}

function typeKey(letter){
    if(!activeInput) return;

    if(activeInput.id === "lastInitial" && activeInput.value.length >= 1){
        return;
    }

    let finalLetter = shiftOn ? letter.toUpperCase() : letter.toLowerCase();

    activeInput.value += finalLetter;
    activeInput.focus();
}

function backspaceKey(){
    if(!activeInput) return;
    activeInput.value = activeInput.value.slice(0, -1);
    activeInput.focus();
}

function hideKeyboard(){
    document.getElementById("keyboard").style.display = "none";
    if(activeInput) activeInput.blur();
}

function submitPilot(){

    const button = document.getElementById("submitButton");
    button.disabled = true;
    button.innerText = "Submitting...";

    const firstName = document.getElementById("firstName").value.trim();
    const lastInitial = document.getElementById("lastInitial").value.trim().toUpperCase();
    const callsign = document.getElementById("callsign").value.trim();
    const aircraft = document.getElementById("aircraft").value;
    const timeSlot = document.getElementById("timeSlot").value;

    if(!firstName || !lastInitial || !callsign || !aircraft || !timeSlot){
        alert("Please fill out all fields.");
        button.disabled = false;
        button.innerText = "Begin Session";
        return;
    }

    const pilot = {
        pilotID: Date.now(),
        firstName: firstName,
        lastInitial: lastInitial,
        callsign: callsign,
        aircraft: aircraft,
        timeSlot: timeSlot
    };

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify(pilot)
    })
    .then(response => response.json())
    .then(data => {
        alert("Check-in complete. Good luck, pilot.");

        document.getElementById("firstName").value = "";
        document.getElementById("lastInitial").value = "";
        document.getElementById("callsign").value = "";
        document.getElementById("aircraft").value = "";
        document.getElementById("timeSlot").value = "";

        hideKeyboard();

        button.disabled = false;
        button.innerText = "Begin Session";
    })
    .catch(error => {
        console.log(error);
        alert("Error submitting registration.");
        button.disabled = false;
        button.innerText = "Begin Session";
    });
}
</script>

</body>
</html>
