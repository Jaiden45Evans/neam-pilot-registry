<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:white;
}

.header{
    text-align:center;
    padding:35px 20px 20px;
}

.header h1{
    margin:0;
    font-size:42px;
}

.header p{
    color:#b8c2d6;
}

.nav{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.nav a{
    color:white;
    text-decoration:none;
    padding:9px 12px;
    background:#1d4ed8;
    border-radius:8px;
    font-size:14px;
}

.nav a:hover{
    background:#2563eb;
}

.board{
    max-width:1100px;
    margin:auto;
    background:#111827;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(0,0,0,.35);
}

.board-title{
    background:#1d4ed8;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

.row{
    display:grid;
    grid-template-columns:90px 1fr 1fr 140px;
    padding:18px;
    border-bottom:1px solid #263449;
    align-items:center;
}

.row.header-row{
    background:#172033;
    color:#9ec8ff;
    font-weight:bold;
}

.rank{
    font-size:22px;
    font-weight:bold;
}

.callsign{
    font-size:22px;
    font-weight:bold;
}

.aircraft{
    color:#dbeafe;
}

.kills{
    text-align:right;
    font-size:22px;
    font-weight:bold;
    color:#facc15;
}

.empty{
    padding:30px;
    text-align:center;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
    <h1>Leaderboard</h1>
    <p>New England Air Museum Simulator Operations Center</p>
</div>

<div class="nav">
    <a href="index.html">Register</a>
    <a href="active.html">Recent Flights</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="search.html">Search</a>
</div>

<div class="board">

    <div class="board-title">
        TOP PILOTS BY KILLS
    </div>

    <div class="row header-row">
        <div>RANK</div>
        <div>CALLSIGN</div>
        <div>AIRCRAFT</div>
        <div>KILLS</div>
    </div>

    <div id="leaderboardData">
        <div class="empty">Loading leaderboard...</div>
    </div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHkwKVSKavKNFNJ-U4MRojMF9deaUUIt3TVNGbb81k9E5Z4yY1D44pBL168GVcxFWemw/exec";

fetch(SCRIPT_URL)
.then(response => response.json())
.then(data => {

    const container = document.getElementById("leaderboardData");

    const scoredPilots = data
        .filter(pilot => Number(pilot.kills) > 0)
        .sort((a,b) => Number(b.kills) - Number(a.kills));

    if(scoredPilots.length === 0){
        container.innerHTML =
        '<div class="empty">No kills posted yet.</div>';
        return;
    }

    let html = "";

    scoredPilots.forEach((pilot,index) => {

        html += `
            <div class="row">
                <div class="rank">#${index + 1}</div>

                <div>
                    <div class="callsign">${pilot.callsign || "Unknown"}</div>
                    <div>${pilot.firstName || ""} ${pilot.lastInitial || ""}</div>
                </div>

                <div class="aircraft">
                    ${pilot.aircraft || "Not Selected"}
                </div>

                <div class="kills">
                    ${pilot.kills || 0}
                </div>
            </div>
        `;

    });

    container.innerHTML = html;

})
.catch(error => {

    document.getElementById("leaderboardData").innerHTML =
    '<div class="empty">Unable to load leaderboard.</div>';

    console.log(error);

});

</script>

</body>
</html>
