<!DOCTYPE html>
<html>
<head>
<title>Search Pilots</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;
    color:white;
    overflow-x:hidden;
    background:linear-gradient(to bottom,#5fb8ff 0%,#9bdcff 45%,#dff6ff 100%);
}

.sky{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.sun-glow{
    position:absolute;
    width:520px;
    height:520px;
    top:-160px;
    right:-120px;
    background:radial-gradient(circle,rgba(255,255,255,.75),rgba(255,255,255,.22),rgba(255,255,255,0) 70%);
    filter:blur(8px);
}

.cloud{
    position:absolute;
    width:360px;
    height:120px;
    background:rgba(255,255,255,.65);
    border-radius:100px;
    filter:blur(12px);
    opacity:.75;
    animation:cloudMove linear infinite;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:rgba(255,255,255,.75);
    border-radius:50%;
}

.cloud::before{
    width:180px;
    height:180px;
    left:45px;
    top:-75px;
}

.cloud::after{
    width:220px;
    height:220px;
    right:20px;
    top:-105px;
}

.cloud1{ top:12%; left:-520px; animation-duration:70s; }
.cloud2{ top:34%; left:-620px; width:460px; height:140px; animation-duration:95s; animation-delay:12s; opacity:.55; }
.cloud3{ top:68%; left:-560px; width:420px; height:130px; animation-duration:85s; animation-delay:25s; opacity:.48; }
.cloud4{ top:50%; left:-700px; width:600px; height:150px; animation-duration:120s; animation-delay:40s; opacity:.32; }

@keyframes cloudMove{
    from{ transform:translateX(-650px); }
    to{ transform:translateX(150vw); }
}

.page{
    position:relative;
    z-index:5;
    padding-bottom:40px;
}

.header{
    text-align:center;
    padding:35px 20px 20px;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
}

.header h1{
    margin:0;
    font-size:42px;
}

.header p{
    color:#e5edf7;
}

.nav{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.nav a{
    color:white;
    text-decoration:none;
    padding:9px 12px;
    background:#1d4ed8;
    border-radius:8px;
    font-size:14px;
}

.nav a:hover{
    background:#2563eb;
}

.searchBox{
    max-width:700px;
    margin:0 auto 25px;
    padding:0 20px;
}

input{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    padding:12px;
    font-size:17px;
    background:rgba(17,24,39,.88);
    color:white;
    backdrop-filter:blur(12px);
    box-shadow:0 0 25px rgba(0,0,0,.25);
}

input::placeholder{
    color:#cbd5e1;
}

.results{
    max-width:1000px;
    margin:auto;
    padding:0 20px 40px;
}

.card{
    background:rgba(17,24,39,.88);
    backdrop-filter:blur(12px);
    border-radius:12px;
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 0 25px rgba(0,0,0,.3);
    border:1px solid rgba(255,255,255,.12);
}

.card a{
    color:white;
    text-decoration:none;
}

.card a:hover{
    color:#9ec8ff;
    text-decoration:underline;
}

.callsign{
    font-size:24px;
    font-weight:bold;
}

.meta{
    color:#cbd5e1;
    margin-top:6px;
}

.empty{
    text-align:center;
    color:#e5edf7;
    margin-top:30px;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
}
</style>
</head>

<body>

<div class="sky">
    <div class="sun-glow"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>
</div>

<div class="page">

<div class="header">
    <h1>Search Pilots</h1>
    <p>New England Air Museum Simulator Operations Center</p>
</div>

<div class="nav">
    <a href="index.html">Register</a>
    <a href="active.html">Recent Flights</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="search.html">Search</a>
</div>

<div class="searchBox">
    <input id="searchInput" placeholder="Search by callsign, first name, aircraft, or notes...">
</div>

<div class="results" id="results">
    <div class="empty">Loading pilots...</div>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHkwKVSKavKNFNJ-U4MRojMF9deaUUIt3TVNGbb81k9E5Z4yY1D44pBL168GVcxFWemw/exec";

let allPilots = [];

fetch(SCRIPT_URL)
.then(response => response.json())
.then(data => {
    allPilots = data.reverse();
    showResults(allPilots);
})
.catch(error => {
    document.getElementById("results").innerHTML =
    '<div class="empty">Unable to load pilots.</div>';
    console.log(error);
});

document.getElementById("searchInput").addEventListener("input", function(){
    const search = this.value.toLowerCase().trim();

    const filtered = allPilots.filter(pilot => {
        return (
            String(pilot.callsign || "").toLowerCase().includes(search) ||
            String(pilot.firstName || "").toLowerCase().includes(search) ||
            String(pilot.lastInitial || "").toLowerCase().includes(search) ||
            String(pilot.aircraft || "").toLowerCase().includes(search) ||
            String(pilot.notes || "").toLowerCase().includes(search)
        );
    });

    showResults(filtered);
});

function showResults(pilots){

    const results = document.getElementById("results");

    if(pilots.length === 0){
        results.innerHTML = '<div class="empty">No matching pilots found.</div>';
        return;
    }

    let html = "";

    pilots.forEach(pilot => {
        html += `
            <div class="card">
                <a href="pilot.html?id=${pilot.pilotID}">
                    <div class="callsign">${pilot.callsign || "Unknown"}</div>
                </a>
                <div class="meta">
                    ${pilot.firstName || ""} ${pilot.lastInitial || ""} ·
                    ${pilot.aircraft || "No aircraft"} ·
                    ${pilot.timeSlot || "No time"}
                </div>
                <div class="meta">
                    ${pilot.notes || ""}
                </div>
            </div>
        `;
    });

    results.innerHTML = html;
}
</script>

</body>
</html>
