<!DOCTYPE html>
<html>
<head>
<title>Active Pilots</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:white;
}

.header{
    text-align:center;
    padding:30px;
}

.header h1{
    margin:0;
}

.nav{
    text-align:center;
    margin-bottom:20px;
}

.nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    padding:10px 15px;
    background:#1d4ed8;
    border-radius:8px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#172033;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(0,0,0,.25);
}

.callsign{
    font-size:22px;
    font-weight:bold;
}

.aircraft{
    color:#9ec8ff;
}

.time{
    color:#b8c2d6;
}
</style>

</head>

<body>

<div class="header">
    <h1>Active Pilots</h1>
    <p>New England Air Museum Simulator Registry</p>
</div>

<div class="nav">
    <a href="index.html">Register</a>
    <a href="active.html">Active Pilots</a>
</div>

<div class="container" id="pilotList">
    Loading pilots...
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHkwKVSKavKNFNJ-U4MRojMF9deaUUIt3TVNGbb81k9E5Z4yY1D44pBL168GVcxFWemw/exec";

fetch(SCRIPT_URL)
.then(response => response.json())
.then(data => {

    const container = document.getElementById("pilotList");

    container.innerHTML = "";

    data.reverse();

    data.forEach(pilot => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="callsign">${pilot.callsign}</div>
            <div>${pilot.firstName} ${pilot.lastInitial}</div>
            <div class="aircraft">${pilot.aircraft}</div>
            <div class="time">${pilot.timeSlot}</div>
        `;

        container.appendChild(card);

    });

})
.catch(error => {

    document.getElementById("pilotList").innerHTML =
    "Unable to load pilot data.";

    console.log(error);

});

</script>

</body>
</html>
