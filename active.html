<!DOCTYPE html>
<html>
<head>
<title>Recent Flights</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:white;
}

.header{
    text-align:center;
    padding:35px 20px 20px;
}

.header h1{
    margin:0;
    font-size:42px;
}

.header p{
    color:#b8c2d6;
}

.nav{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.nav a{
    color:white;
    text-decoration:none;
    padding:9px 12px;
    background:#1d4ed8;
    border-radius:8px;
    font-size:14px;
}

.nav a:hover{
    background:#2563eb;
}

.board{
    max-width:1100px;
    margin:auto;
    background:#111827;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(0,0,0,.35);
}

.board-title{
    background:#1d4ed8;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

.board-subtitle{
    background:#172033;
    color:#94a3b8;
    padding:10px 18px;
    font-size:14px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    padding:18px;
    border-bottom:1px solid #263449;
    align-items:center;
}

.row.header-row{
    background:#172033;
    color:#9ec8ff;
    font-weight:bold;
}

.callsign a{
    color:white;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
}

.callsign a:hover{
    color:#9ec8ff;
    text-decoration:underline;
}

.aircraft{
    color:#dbeafe;
}

.time{
    color:#cbd5e1;
}

.time small{
    color:#94a3b8;
}

.empty{
    padding:30px;
    text-align:center;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
    <h1>Recent Flights</h1>
    <p>New England Air Museum Simulator Operations Center</p>
</div>

<div class="nav">
    <a href="index.html">Register</a>
    <a href="active.html">Recent Flights</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="search.html">Search</a>
</div>

<div class="board">

    <div class="board-title">
        RECENT FLIGHTS
    </div>

    <div class="board-subtitle">
        Showing flights from the last 7 days
    </div>

    <div class="row header-row">
        <div>CALLSIGN</div>
        <div>AIRCRAFT</div>
        <div>SESSION</div>
    </div>

    <div id="pilotList">
        <div class="empty">Loading flights...</div>
    </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHkwKVSKavKNFNJ-U4MRojMF9deaUUIt3TVNGbb81k9E5Z4yY1D44pBL168GVcxFWemw/exec";

function parseSheetDate(value){
    if(!value) return null;

    const date = new Date(value);

    if(isNaN(date.getTime())){
        return null;
    }

    return date;
}

fetch(SCRIPT_URL)
.then(response => response.json())
.then(data => {

    const container = document.getElementById("pilotList");
    container.innerHTML = "";

    const now = new Date();
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(now.getDate() - 7);

    const recentFlights = data.filter(pilot => {
        const flightDate = parseSheetDate(pilot.timestamp);
        if(!flightDate) return false;
        return flightDate >= sevenDaysAgo;
    });

    recentFlights.reverse();

    if(recentFlights.length === 0){
        container.innerHTML =
        '<div class="empty">No recent flights in the last 7 days.</div>';
        return;
    }

    recentFlights.forEach(pilot => {

        const row = document.createElement("div");
        row.className = "row";

        row.innerHTML = `
            <div>
                <div class="callsign">
                    <a href="pilot.html?id=${pilot.pilotID}">
                        ${pilot.callsign || "Unknown"}
                    </a>
                </div>
                <div>${pilot.firstName || ""} ${pilot.lastInitial || ""}</div>
            </div>

            <div class="aircraft">
                ${pilot.aircraft || "Not Selected"}
            </div>

            <div class="time">
                <strong>${pilot.timeSlot || "No Time"}</strong><br>
                <small>${pilot.sessionDate || ""}</small>
            </div>
        `;

        container.appendChild(row);

    });

})
.catch(error => {

    document.getElementById("pilotList").innerHTML =
    '<div class="empty">Unable to load flight data.</div>';

    console.log(error);

});
</script>

</body>
</html>
